<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InTrack – Login</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">🎯 InTrack</div>
    <p class="auth-sub">Internship & Job Application Tracker</p>
    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" />
      </div>
      <p class="error-msg" id="login-error">Invalid credentials. Try admin / admin123</p>
      <button type="button" class="btn btn-primary btn-full" onclick="login()">Login</button>
    </form>
    <p class="auth-hint">Demo: <strong>admin</strong> / <strong>admin123</strong></p>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
